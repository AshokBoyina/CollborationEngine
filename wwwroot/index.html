        // Screen sharing functions
        async function startScreenShare() {
            if (!currentSession) {
                alert('Please create a session first');
                return;
            }

            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                
                // Setup local video preview for the sharer
                const localVideo = document.getElementById('localVideo');
                if (localVideo) {
                    localVideo.srcObject = localStream;
                    localVideo.style.display = 'block';
                }
                
                // Start WebRTC connection for streaming
                await startWebRTCConnection();
                
                await ensureConnected();
                await connection.invoke("StartScreenShare", currentSession.CollaborationId);

                // Auto-start recording when sharing starts
                await startRecording();
            } catch (error) {
                alert('Failed to start screen sharing: ' + error.message);
            }
        }

        async function stopScreenShare() {
            // Stop recording first so MediaRecorder can finalize while tracks are still alive
            try {
                await stopRecording();
            } catch (e) {
                console.error('Failed to stop recording during stopScreenShare', e);
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            // Hide local video
            const localVideo = document.getElementById('localVideo');
            if (localVideo) {
                localVideo.style.display = 'none';
                localVideo.srcObject = null;
            }

            // Close WebRTC connection
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            if (currentSession) {
                await ensureConnected();
                await connection.invoke("StopScreenShare", currentSession.CollaborationId);
            }
        }

        // WebRTC functions
        function ensurePeerConnection() {
            if (peerConnection) return peerConnection;

            const forceRelay = new URLSearchParams(window.location.search).get('forceRelay') === '1';

            const configuration = {
                iceTransportPolicy: forceRelay ? 'relay' : 'all',
                iceServers: [
                    { urls: 'stun:57.151.97.238:3478' },
                    {
                        urls: [
                            'turn:57.151.97.238:3478?transport=udp',
                            'turn:57.151.97.238:3478?transport=tcp'
                        ],
                        username: 'readi',
                        credential: 'NASS9411!!!'
                    }
                ]
            };

            peerConnection = new RTCPeerConnection(configuration);

            peerConnection.ontrack = (event) => {
                const [remoteStream] = event.streams;
                const video = document.getElementById('videoPlayer');
                if (video) {
                    video.autoplay = true;
                    video.playsInline = true;
                    video.muted = true;
                    video.srcObject = remoteStream;
                    video.style.display = 'block';
                    const playPromise = video.play();
                    if (playPromise && typeof playPromise.catch === 'function') {
                        playPromise.catch(() => {});
                    }
                    const placeholder = document.getElementById('videoPlaceholder');
                    if (placeholder) placeholder.style.display = 'none';
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate && connection && currentSession?.CollaborationId) {
                    const target = remotePublisherConnectionId;
                    if (target) {
                        connection.invoke("SendWebRTCIceCandidateTo", currentSession.CollaborationId, target, event.candidate)
                            .catch(err => console.error('Failed to send ICE candidate', err));
                    } else {
                        connection.invoke("SendWebRTCIceCandidate", currentSession.CollaborationId, event.candidate)
                            .catch(err => console.error('Failed to send ICE candidate', err));
                    }
                }
            };

            return peerConnection;
        }

        async function startWebRTCConnection() {
            // Caller (screen sharer) flow: must have localStream and sends offer
            if (!localStream) {
                throw new Error('No local stream available for screen sharing');
            }

            const pc = ensurePeerConnection();

            // Add local stream tracks (only for caller)
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            await connection.invoke("SendWebRTCOffer", currentSession.CollaborationId, offer);
        }

        function createPeerConnectionForViewer(viewerConnectionId) {
            const forceRelay = new URLSearchParams(window.location.search).get('forceRelay') === '1';

            const configuration = {
                iceTransportPolicy: forceRelay ? 'relay' : 'all',
                iceServers: [
                    { urls: 'stun:57.151.97.238:3478' },
                    {
                        urls: [
                            'turn:57.151.97.238:3478?transport=udp',
                            'turn:57.151.97.238:3478?transport=tcp'
                        ],
                        username: 'readi',
                        credential: 'NASS9411!!!'
                    }
                ]
            };

            const pc = new RTCPeerConnection(configuration);
            pc.onicecandidate = (event) => {
                if (event.candidate && connection && currentSession?.CollaborationId) {
                    connection.invoke("SendWebRTCIceCandidateTo", currentSession.CollaborationId, viewerConnectionId, event.candidate)
                        .catch(err => console.error('Failed to send ICE candidate', err));
                }
            };

            return pc;
        }

        async function startWebRTCConnectionToViewer(collaborationId, viewerConnectionId) {
            if (!localStream) {
                throw new Error('No local stream available for screen sharing');
            }

            const existing = publisherPeerConnections[viewerConnectionId];
            if (existing) {
                try { existing.close(); } catch { }
            }

            const pc = createPeerConnectionForViewer(viewerConnectionId);
            publisherPeerConnections[viewerConnectionId] = pc;

            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            await connection.invoke("SendWebRTCOfferTo", collaborationId, viewerConnectionId, offer);
        }

        // Recording functions
        let mediaRecorder = null;
        let recordedChunks = [];

        async function startRecording() {
            if (!currentSession || !currentSession.CollaborationId) {
                alert('Please create a session first');
                return;
            }

            try {
                // Start API recording
                const response = await fetch(`${API_BASE_URL}/collaboration/session/${currentSession.CollaborationId}/recording/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Start actual browser recording if we have a stream
                    if (localStream) {
                        recordedChunks = [];
                        mediaRecorder = new MediaRecorder(localStream, {
                            mimeType: 'video/webm'
                        });

                        mediaRecorder.ondataavailable = (event) => {
                            if (event.data.size > 0) {
                                recordedChunks.push(event.data);
                            }
                        };

                        mediaRecorder.onstop = async () => {
                            const blob = new Blob(recordedChunks, { type: 'video/webm' });
                            await saveRecordingLocally(blob, currentSession.CollaborationId);
                        };

                        mediaRecorder.start();
                        addSystemMessage('Recording started locally');
                    }
                }
            } catch (error) {
                alert('Failed to start recording: ' + error.message);
            }
        }

        async function stopRecording() {
            if (!currentSession || !currentSession.CollaborationId) return;

            try {
                // Stop browser recording
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                    mediaRecorder = null;
                }

                // Stop API recording
                await fetch(`${API_BASE_URL}/collaboration/session/${currentSession.CollaborationId}/recording/stop`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                addSystemMessage('Recording stopped and saved locally');
            } catch (error) {
                alert('Failed to stop recording: ' + error.message);
            }
        }

        async function saveRecordingLocally(blob, collaborationId) {
            try {
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                const filename = `${collaborationId}_${timestamp}.webm`;

                // Save to server (local storage under wwwroot/recordings)
                await uploadRecordingToServer(blob, filename);
                if (currentUser?.userType === 'supervisor') {
                    addSystemMessage(`Recording saved: ${filename}`);
                }
            } catch (error) {
                console.error('Failed to save recording:', error);
                addSystemMessage('Failed to save recording locally');
            }
        }

        async function uploadRecordingToServer(blob, filename) {
            try {
                const formData = new FormData();
                formData.append('file', blob, filename);
                formData.append('collaborationId', currentSession.CollaborationId);

                const response = await fetch(`${API_BASE_URL}/recording/session/${currentSession.CollaborationId}/recording/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    if (currentUser?.userType === 'supervisor') {
                        addSystemMessage(`Recording uploaded to server: ${data.recordingUrl}`);
                    }
                    
                    // Refresh recordings list if user is supervisor
                    if (currentUser.userType === 'supervisor') {
                        loadSavedRecordings();
                    }
                }
            } catch (error) {
                console.error('Failed to upload recording:', error);
            }
        }

        // Load saved recordings for supervisors
        async function loadSavedRecordings() {
            if (currentUser.userType !== 'supervisor') return;

            try {
                // Load recordings for current session or all sessions
                const collaborationId = currentSession?.CollaborationId || 'all';
                const response = await fetch(`${API_BASE_URL}/recording/session/${collaborationId}/recordings`);
                
                if (response.ok) {
                    const recordings = await response.json();
                    displayRecordings(recordings);
                }
            } catch (error) {
                console.error('Failed to load recordings:', error);
            }
        }

        // Display recordings in the gallery
        function displayRecordings(recordings) {
            const recordingsList = document.getElementById('recordingsList');
            
            if (recordings.length === 0) {
                recordingsList.innerHTML = '<p class="text-sm text-gray-500">No recordings available</p>';
                return;
            }

            recordingsList.innerHTML = recordings.map(rec => `
                <div class="border rounded p-2 hover:bg-gray-50">
                    <div class="flex justify-between items-start mb-1">
                        <div class="flex-1">
                            <p class="text-sm font-medium truncate">${(rec.agentName || rec.AgentName || 'Agent')} • ${(rec.userName || rec.UserName || 'User')}</p>
                            <p class="text-xs text-gray-600 truncate">${rec.fileName}</p>
                            <p class="text-xs text-gray-500">${formatFileSize(rec.size)} • ${formatDate(rec.created)}</p>
                        </div>
                        <div class="flex space-x-1 ml-2">
                            <button onclick="playRecording('${rec.url}', '${rec.fileName}')" class="bg-blue-500 text-white px-2 py-1 rounded text-xs hover:bg-blue-600">
                                <i class="fas fa-play"></i>
                            </button>
                            <button onclick="downloadRecording('${rec.url}', '${rec.fileName}')" class="bg-green-500 text-white px-2 py-1 rounded text-xs hover:bg-green-600">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Play recording in video player
        async function playRecording(url, filename) {
            const video = document.getElementById('videoPlayer');
            const placeholder = document.getElementById('videoPlaceholder');
            
            try {
                video.src = url;
                video.style.display = 'block';
                placeholder.style.display = 'none';
                video.play();
                
                addSystemMessage(`Now playing: ${filename}`);
            } catch (error) {
                console.error('Failed to play recording:', error);
                addSystemMessage('Failed to play recording');
            }
        }

        // Download recording
        function downloadRecording(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            addSystemMessage(`Downloaded: ${filename}`);
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        // WebRTC signaling handlers
        async function handleWebRTCOffer(offer) {
            try {
                const offerObj = offer?.Offer || offer?.offer || offer;
                const fromConnectionId = offer?.FromConnectionId || offer?.fromConnectionId || null;
                if (fromConnectionId) {
                    remotePublisherConnectionId = fromConnectionId;
                }
                if (peerConnection) {
                    try { peerConnection.close(); } catch { }
                    peerConnection = null;
                }
                const pc = ensurePeerConnection();
                await pc.setRemoteDescription(new RTCSessionDescription(offerObj));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                if (remotePublisherConnectionId) {
                    await connection.invoke("SendWebRTCAnswerTo", currentSession.CollaborationId, remotePublisherConnectionId, answer);
                } else {
                    await connection.invoke("SendWebRTCAnswer", currentSession.CollaborationId, answer);
                }
            } catch (error) {
                console.error('Error handling WebRTC offer:', error);
            }
        }

        async function handleWebRTCAnswer(answer) {
            try {
                const answerObj = answer?.Answer || answer?.answer || answer;
                const fromConnectionId = answer?.FromConnectionId || answer?.fromConnectionId || null;

                if (fromConnectionId && publisherPeerConnections[fromConnectionId]) {
                    await publisherPeerConnections[fromConnectionId].setRemoteDescription(new RTCSessionDescription(answerObj));
                    return;
                }

                if (!peerConnection) {
                    ensurePeerConnection();
                }
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answerObj));
            } catch (error) {
                console.error('Error handling WebRTC answer:', error);
            }
        }

        async function handleWebRTCIceCandidate(candidate) {
            try {
                const candidateObj = candidate?.Candidate || candidate?.candidate || candidate;
                const fromConnectionId = candidate?.FromConnectionId || candidate?.fromConnectionId || null;

                if (fromConnectionId && publisherPeerConnections[fromConnectionId]) {
                    await publisherPeerConnections[fromConnectionId].addIceCandidate(new RTCIceCandidate(candidateObj));
                    return;
                }

                if (!peerConnection) {
                    ensurePeerConnection();
                }
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidateObj));
            } catch (error) {
                console.error('Error handling ICE candidate:', error);
            }
        }

        // Load available staff
        async function loadAvailableStaff() {
            try {
                const [agentsResponse, supervisorsResponse] = await Promise.all([
                    fetch(`${API_BASE_URL}/management/agents/available`, {
                        headers: { 'Content-Type': 'application/json' }
                    }),
                    fetch(`${API_BASE_URL}/management/supervisors/available`, {
                        headers: { 'Content-Type': 'application/json' }
                    })
                ]);

                if (agentsResponse.ok) {
                    const agents = await agentsResponse.json();
                    displayAgents(agents);
                }

                if (supervisorsResponse.ok) {
                    const supervisors = await supervisorsResponse.json();
                    displaySupervisors(supervisors);
                }
            } catch (error) {
                console.error('Failed to load staff:', error);
            }
        }

        // Display agents
        function displayAgents(agents) {
            const agentsList = document.getElementById('agentsList');
            agentsList.innerHTML = '';

            if (agents.length === 0) {
                agentsList.innerHTML = '<p class="text-sm text-gray-500">No agents available</p>';
                return;
            }

            agents.forEach(agent => {
                const name = agent?.Name || agent?.name || '';
                const isAvailable = agent?.IsAvailable ?? agent?.isAvailable;
                const department = agent?.Department || agent?.department || 'N/A';
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-2 bg-gray-50 rounded';
                div.innerHTML = `
                    <span class="text-sm">${name || 'Unknown'} ${isAvailable ? '(Available)' : '(Busy)'}</span>
                    <span class="text-xs text-gray-500">${department}</span>
                `;
                agentsList.appendChild(div);
            });
        }

        // Display supervisors
        function displaySupervisors(supervisors) {
            const supervisorsList = document.getElementById('supervisorsList');
            supervisorsList.innerHTML = '';

            if (supervisors.length === 0) {
                supervisorsList.innerHTML = '<p class="text-sm text-gray-500">No supervisors available</p>';
                return;
            }

            supervisors.forEach(supervisor => {
                const name = supervisor?.Name || supervisor?.name || '';
                const isAvailable = supervisor?.IsAvailable ?? supervisor?.isAvailable;
                const department = supervisor?.Department || supervisor?.department || 'N/A';
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-2 bg-gray-50 rounded';
                div.innerHTML = `
                    <span class="text-sm">${name || 'Unknown'} ${isAvailable ? '(Available)' : '(Busy)'}</span>
                    <span class="text-xs text-gray-500">${department}</span>
                `;
                supervisorsList.appendChild(div);
            });
        }

        // Load session info
        async function loadSessionInfo() {
            if (!currentSession || !currentSession.CollaborationId) {
                if (currentSession && !currentSession.CollaborationId) {
                    localStorage.removeItem('currentSession');
                    currentSession = null;
                    setChatEnabled(false);
                }
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/collaboration/session/${currentSession.CollaborationId}`, {
                    headers: { 'Content-Type': 'application/json' }
                });

                if (response.ok) {
                    const session = await response.json();
                    displaySessionInfo(session);
                }
            } catch (error) {
                console.error('Failed to load session info:', error);
            }
        }

        // Display session info
        function displaySessionInfo(session) {
            const infoDiv = document.getElementById('sessionInfo');

            const status = session?.Status || session?.status || '';
            const startedAt = session?.StartedAt || session?.startedAt;
            const endedAt = session?.EndedAt || session?.endedAt;
            const isRecording = session?.IsRecording ?? session?.isRecording;
            const userName = session?.UserName || session?.userName || session?.User?.Name || session?.User?.name || session?.user?.Name || session?.user?.name || '';
            const agentName = session?.AgentName || session?.agentName || session?.Agent?.Name || session?.Agent?.name || session?.agent?.Name || session?.agent?.name || '';
            infoDiv.innerHTML = `
                <p><strong>Status:</strong> ${status || ''}</p>
                <p><strong>Started:</strong> ${startedAt ? new Date(startedAt).toLocaleString() : ''}</p>
                ${endedAt ? `<p><strong>Ended:</strong> ${new Date(endedAt).toLocaleString()}</p>` : ''}
                <p><strong>User:</strong> ${userName || 'Unknown'}</p>
                ${agentName ? `<p><strong>Agent:</strong> ${agentName}</p>` : '<p><strong>Agent:</strong> Not assigned</p>'}
                <p><strong>Recording:</strong> ${isRecording ? 'Active' : 'Inactive'}</p>
            `;
        }

        // Update connection status
        function updateConnectionStatus(connected) {
            const statusDiv = document.getElementById('connectionStatus');
            if (connected) {
                statusDiv.innerHTML = '<span class="text-green-500"><i class="fas fa-circle"></i> Connected</span>';
            } else {
                statusDiv.innerHTML = '<span class="text-red-500"><i class="fas fa-circle"></i> Disconnected</span>';
            }
        }

        // Update recording status
        function updateRecordingStatus(isRecording) {
            // This would update the UI to show recording status
            console.log('Recording status:', isRecording);
        }

        // Start viewing stream (for agents/supervisors)
        async function startViewingStream(streamUrl) {
            const video = document.getElementById('videoPlayer');
            const placeholder = document.getElementById('videoPlaceholder');
            
            try {
                video.src = streamUrl;
                video.style.display = 'block';
                placeholder.style.display = 'none';
                video.play();
            } catch (error) {
                console.error('Failed to start viewing stream:', error);
            }
        }

        // Stop viewing stream
        function stopViewingStream() {
            const video = document.getElementById('videoPlayer');
            const placeholder = document.getElementById('videoPlaceholder');
            
            try {
                video.pause();
            } catch { }
            video.srcObject = null;
            video.src = '';
            video.style.display = 'none';
            placeholder.style.display = 'flex';
        }

        function cleanupWebRTC() {
            stopViewingStream();

            remotePublisherConnectionId = null;

            if (peerConnection) {
                try { peerConnection.close(); } catch { }
                peerConnection = null;
            }

            if (publisherPeerConnections) {
                for (const key of Object.keys(publisherPeerConnections)) {
                    try { publisherPeerConnections[key]?.close(); } catch { }
                }
            }
            publisherPeerConnections = {};
        }

        async function resumeViewingStream() {
            try {
                if (!(currentUser?.userType === 'agent' || currentUser?.userType === 'supervisor')) {
                    return;
                }
                const collaborationId = currentSession?.CollaborationId;
                if (!collaborationId) {
                    alert('No active session to resume');
                    return;
                }

                cleanupWebRTC();
                await joinCollaborationOnce(collaborationId);
                await connection.invoke('ViewerReady', collaborationId);
            } catch (e) {
                console.error('Resume stream failed', e);
                alert('Failed to resume stream');
            }
        }

        // End session
        async function endSession() {
            if (!currentSession) return;

            if (confirm('Are you sure you want to end this session?')) {
                try {
                    await fetch(`${API_BASE_URL}/collaboration/session/${currentSession.CollaborationId}/end`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });

                    await leaveCollaborationIfJoined(currentSession.CollaborationId);

                    cleanupWebRTC();

                    currentSession = null;
                    try { localStorage.removeItem('currentSession'); } catch { }
                    document.getElementById('collaborationId').textContent = '';
                    clearChat();
                    document.getElementById('sessionInfo').innerHTML = '';
                    setChatEnabled(false);
                } catch (error) {
                    alert('Failed to end session: ' + error.message);
                }
            }
        }

        // Logout
        function logout() {
            cleanupWebRTC();

            if (connection) {
                try { connection.stop(); } catch { }
            }

            joinedCollaborationId = null;
            
            localStorage.removeItem('currentUser');
            localStorage.removeItem('currentSession');
            currentUser = null;
            currentSession = null;
            
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('collaborationSection').classList.add('hidden');
            
            // Reset form
            document.getElementById('loginForm').reset();
            switchUserType('user');
        }
    </script>
</body>
